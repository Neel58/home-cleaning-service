{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>CleanHome</title>
    <link rel="stylesheet" href="{% static 'cleaning/style.css' %}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <a href="{% url 'index' %}" class="logo">
        CleanHome
    </a>

    <nav>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'services' %}">Services</a>

    {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Signup</a>
    {% endif %}
    </nav>

</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>© 2026 CleanHome. All rights reserved.</p>
</footer>

</body>
</html>
