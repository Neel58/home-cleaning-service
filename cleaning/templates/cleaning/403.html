{% extends 'cleaning/base.html' %}
{% load static %}

{% block title %}Access Denied - CleanHome{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5 text-center">
                    <p class="display-1 text-warning mb-0">403</p>
                    <h1 class="card-title text-primary mb-3">Access Denied</h1>
                    <p class="card-text text-muted mb-4">
                        You don't have permission to access this page. 
                        Please check your account or contact support.
                    </p>
                    <a href="{% url 'logged_in_home' %}" class="btn btn-primary btn-lg">Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
