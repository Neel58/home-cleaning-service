{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - CleanHome</title>
    <link rel="stylesheet" href="{% static 'cleaning/style.css' %}">
    <style>
        .password-reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6f42c1 0%, #5a2d8f 100%);
            padding: 2rem;
        }
        
        .password-reset-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .password-reset-card h1 {
            color: #28a745;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }
        
        .password-reset-card p {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="password-reset-container">
        <div class="password-reset-card">
            <h1>✓ Password Reset Successful</h1>
            <p>Your password has been successfully reset.</p>
            <p>You can now log in with your new password.</p>
            
            <div style="background: #d4edda; padding: 1rem; border-radius: 4px; margin: 1.5rem 0; color: #155724;">
                <strong>Success!</strong> You have successfully changed your password.
            </div>
            
            <hr>
            
            <p style="margin-top: 1.5rem;">
                <a href="{% url 'login' %}" class="btn btn-primary" style="text-decoration: none;">Go to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
